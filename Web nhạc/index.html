<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>React Music Player - Persistent Playlists</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useRef, useEffect } = React;

    const allPlaylists = [
      {
        id: "sontung",
        name: "Sơn Tùng M-TP Mix",
        description: "Tuyển tập những bài hát hay nhất",
        coverImage: "./image/son-tung.jpg",
        songs: [
          { title: "Chúng Ta Của Hiện Tại", artist: "Sơn Tùng M-TP", src: "https://res.cloudinary.com/dzisjnhfj/video/upload/v1776077112/chung-ta-cua-hien-tai_ag6p0h.mp3", cover: "./image/son-tung.jpg"},
          { title: "Muộn Rồi Mà Sao Còn", artist: "Sơn Tùng M-TP", src: "https://res.cloudinary.com/dzisjnhfj/video/upload/v1776077246/muon-roi-sao-ma-con_efuwqp.mp3", cover: "./image/son-tung.jpg"},
          { title: "Nơi Này Có Anh", artist: "Sơn Tùng M-TP", src: "https://res.cloudinary.com/dzisjnhfj/video/upload/v1776077632/noi-nay-co-anh_mrzc22.mp3", cover: "./image/son-tung.jpg"},
          { title: "Đừng Làm Trái Tim Anh Đau", artist: "Sơn Tùng M-TP", src: "https://res.cloudinary.com/dzisjnhfj/video/upload/v1776077659/son-tung-mtp-Dunglamtraitimanhdau_iuf6kb.mp3", cover: "./image/son-tung.jpg"},
        ]
      },
      {
        id: "hieuthuhai",
        name: "HIEUTHUHAI Top Hits",
        description: "Nhạc suy hay nhạc quẩy đều có đủ",
        coverImage: "./image/hieu-thu-hai.jpg",
        songs: [
          { title: "Ngủ Một Mình", artist: "HIEUTHUHAI", src: "https://res.cloudinary.com/dzisjnhfj/video/upload/v1776078799/ngu-mot-minh_p0poia.mp3", cover: "./image/hieu-thu-hai.jpg"},
          { title: "Không Thể Say", artist: "HIEUTHUHAI", src: "https://res.cloudinary.com/dzisjnhfj/video/upload/v1776078567/khong-the-say_uw5ll2.mp3", cover: "./image/hieu-thu-hai.jpg" },
          { title: "Người im lặng gặp người hay nói", artist: "HIEUTHUHAI", src: "https://res.cloudinary.com/dzisjnhfj/video/upload/v1776078850/nguoi-im-lang-gap-nguoi-hay-noi_sbb17g.mp3", cover: "./image/hieu-thu-hai.jpg" },
          { title: "Nghe Như Tình Yêu", artist: "HIEUTHUHAI", src: "https://res.cloudinary.com/dzisjnhfj/video/upload/v1776078828/nghe-nhu-tinh-yeu_bvwubg.mp3", cover: "./image/hieu-thu-hai.jpg"},
        ]
      }
    ];

    const MusicPlayer = () => {
      // 1. LƯU TRỮ VÀ KHỞI TẠO PLAYLISTS TỪ LOCAL STORAGE
      const [playlists, setPlaylists] = useState(() => {
        const savedPlaylists = localStorage.getItem("myAppPlaylists");
        return savedPlaylists ? JSON.parse(savedPlaylists) : allPlaylists;
      });

      // Theo dõi playlists, hễ có thay đổi (tạo mới, thêm bài) là lưu vào LocalStorage ngay
      useEffect(() => {
        localStorage.setItem("myAppPlaylists", JSON.stringify(playlists));
      }, [playlists]);

      const [currentView, setCurrentView] = useState("home");
      const [searchQuery, setSearchQuery] = useState("");
      const [selectedPlaylistIndex, setSelectedPlaylistIndex] = useState(null);
      const [selectedArtist, setSelectedArtist] = useState("");
      
      const [isModalOpen, setIsModalOpen] = useState(false);
      const [newPlaylistName, setNewPlaylistName] = useState("");
      
      const [isAddSongModalOpen, setIsAddSongModalOpen] = useState(false);
      const [songToAdd, setSongToAdd] = useState(null);

      const [activePlaylistIndex, setActivePlaylistIndex] = useState(0);
      const [currentSongIndex, setCurrentSongIndex] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const [currentTime, setCurrentTime] = useState(0);
      const [duration, setDuration] = useState(0);
      const [volume, setVolume] = useState(1);
      const [isShuffle, setIsShuffle] = useState(false);
      const [isRepeat, setIsRepeat] = useState(false);
      
      const [likedSongs, setLikedSongs] = useState(() => {
        const savedLikes = localStorage.getItem("myLikedSongs");
        return savedLikes ? JSON.parse(savedLikes) : [];
      });

      const audioRef = useRef(null);

      useEffect(() => {
        localStorage.setItem("myLikedSongs", JSON.stringify(likedSongs));
      }, [likedSongs]);

      const openPlaylist = (index) => {
        setSelectedPlaylistIndex(index);
        setCurrentView("playlist");
      };

      const currentPlaylist = playlists[activePlaylistIndex];
      const currentSong = currentPlaylist?.songs[currentSongIndex] || {
        title: "Chưa có bài hát",
        artist: "Trống",
        src: "",
        cover: "https://images.unsplash.com/photo-1511671782779-c97d3d27a1d4?q=80&w=200&auto=format&fit=crop"
      };

      const isLiked = likedSongs.includes(currentSong.title);

      const toggleLike = () => {
        if (currentSong.title === "Chưa có bài hát") return;
        if (isLiked) {
          setLikedSongs(likedSongs.filter(song => song !== currentSong.title));
        } else {
          setLikedSongs([...likedSongs, currentSong.title]);
        }
      };

      const handleAddSongToPlaylist = (playlistId) => {
        const updatedPlaylists = playlists.map(pl => {
          if (pl.id === playlistId) {
            const isSongExist = pl.songs.some(s => s.title === songToAdd.title);
            if (!isSongExist) {
              return { ...pl, songs: [...pl.songs, songToAdd] };
            } else {
              alert("Bài hát này đã có trong playlist rồi nhé!");
            }
          }
          return pl;
        });
        setPlaylists(updatedPlaylists);
        setIsAddSongModalOpen(false);
      };

      const playSpecificSong = (targetTitle) => {
        for (let pIndex = 0; pIndex < playlists.length; pIndex++) {
          const playlist = playlists[pIndex];
          const sIndex = playlist.songs.findIndex(s => s.title === targetTitle);
          if (sIndex !== -1) {
            setActivePlaylistIndex(pIndex);
            setCurrentSongIndex(sIndex);
            setIsPlaying(true);
            break; 
          }
        }
      };

      const getArtistByTitle = (targetTitle) => {
        for (let pIndex = 0; pIndex < playlists.length; pIndex++) {
          const song = playlists[pIndex].songs.find(s => s.title === targetTitle);
          if (song) return song.artist;
        }
        return "Nghệ sĩ ẩn danh"; 
      };

      const viewArtist = (artistName) => {
        setSelectedArtist(artistName);
        setCurrentView("artist");
      };

      const formatTime = (timeInSeconds) => {
        if (isNaN(timeInSeconds)) return "0:00";
        const minutes = Math.floor(timeInSeconds / 60);
        const seconds = Math.floor(timeInSeconds % 60);
        return `${minutes}:${seconds < 10 ? '0' : ''}${seconds}`;
      };

      const togglePlayPause = () => {
        if (!currentSong.src) return;
        if (isPlaying) {
          audioRef.current.pause();
        } else {
          audioRef.current.play();
        }
        setIsPlaying(!isPlaying);
      };

      const handleNext = () => {
        if (!currentPlaylist || currentPlaylist.songs.length <= 1) return;
        let nextIndex;
        if (isShuffle) {
          do {
            nextIndex = Math.floor(Math.random() * currentPlaylist.songs.length);
          } while (nextIndex === currentSongIndex); 
        } else {
          nextIndex = (currentSongIndex + 1) % currentPlaylist.songs.length;
        }
        setCurrentSongIndex(nextIndex);
        setIsPlaying(true);
      };

      const handlePrev = () => {
        if (!currentPlaylist || currentPlaylist.songs.length <= 1) return;
        const prevIndex = currentSongIndex === 0 ? currentPlaylist.songs.length - 1 : currentSongIndex - 1;
        setCurrentSongIndex(prevIndex);
        setIsPlaying(true);
      };

      const handleSeek = (e) => {
        const newTime = e.target.value;
        audioRef.current.currentTime = newTime;
        setCurrentTime(newTime);
      };

      const handleVolumeChange = (e) => {
        const newVolume = e.target.value;
        setVolume(newVolume);
        audioRef.current.volume = newVolume;
      };

      useEffect(() => {
        if (isPlaying && currentSong.src) {
          const playPromise = audioRef.current.play();
          if (playPromise !== undefined) {
            playPromise.catch(error => console.log("Lỗi tự động phát:", error));
          }
        }
      }, [currentSongIndex, activePlaylistIndex]);

      const toggleShuffle = () => setIsShuffle(!isShuffle);
      const toggleRepeat = () => setIsRepeat(!isRepeat);

      let searchResults = [];
      if (currentView === "search" && searchQuery.trim() !== "") {
        playlists.forEach(playlist => {
          playlist.songs.forEach(song => {
            if (song.title.toLowerCase().includes(searchQuery.toLowerCase()) || 
                song.artist.toLowerCase().includes(searchQuery.toLowerCase())) {
              searchResults.push(song);
            }
          });
        });
      }

      let artistSongs = [];
      if (currentView === "artist" && selectedArtist !== "") {
        playlists.forEach(playlist => {
          playlist.songs.forEach(song => {
            if (song.artist === selectedArtist && !artistSongs.find(s => s.title === song.title)) {
              artistSongs.push(song);
            }
          });
        });
      }

      const customPlaylists = playlists.filter(p => p.id.startsWith("custom_"));

      return (
        <div className="app-container">
          <div className="top-section">
            <div className="sidebar">
              <h2>🎧 Trực Tuyến</h2>
              <p className={currentView === "home" ? "active" : ""} onClick={() => setCurrentView("home")}>🏠 Trang chủ</p>
              <p className={currentView === "search" ? "active" : ""} onClick={() => { setCurrentView("search"); setSearchQuery(""); }}>🔍 Tìm kiếm</p>
              <p>📚 Thư viện của bạn</p>
              <br/>
              <p style={{ cursor: "pointer" }} onClick={() => setIsModalOpen(true)}>➕ Tạo playlist</p>
              <p className={currentView === "liked" ? "active" : ""} onClick={() => setCurrentView("liked")}>💖 Bài hát đã thích</p>
       
              {isModalOpen && (
                <div className="modal-overlay" onClick={(e) => { if (e.target.className === 'modal-overlay') setIsModalOpen(false); }}>
                  <div className="modal-box">
                    <h3>Tạo Playlist Mới</h3>
                    <input type="text" placeholder="Nhập tên playlist..." value={newPlaylistName} onChange={(e) => setNewPlaylistName(e.target.value)} autoFocus />
                    <div className="modal-actions">
                      <button id="btn-cancel" onClick={() => { setIsModalOpen(false); setNewPlaylistName(""); }}>Hủy</button>
                      <button id="btn-create" onClick={() => {
                        if (newPlaylistName.trim() === '') {
                          alert('Bạn chưa nhập tên playlist!');
                        } else {
                          const newPlaylist = {
                            id: "custom_" + Date.now(),
                            name: newPlaylistName,
                            description: "Playlist cá nhân",
                            coverImage: "https://images.unsplash.com/photo-1470225620780-dba8ba36b745?q=80&w=200&auto=format&fit=crop", 
                            songs: [] 
                          };
                          setPlaylists([...playlists, newPlaylist]);
                          setIsModalOpen(false);
                          setNewPlaylistName("");
                        }
                      }}>Tạo</button>
                    </div>
                  </div>
                </div>
              )}

              {isAddSongModalOpen && (
                <div className="modal-overlay" onClick={(e) => { if (e.target.className === 'modal-overlay') setIsAddSongModalOpen(false); }}>
                  <div className="modal-box">
                    <h3>Thêm vào Playlist</h3>
                    <p style={{color: "#b3b3b3", fontSize: "14px", marginBottom: "15px"}}>Bài hát: <b>{songToAdd?.title}</b></p>
                    {customPlaylists.length === 0 ? (
                      <p style={{textAlign: "center", color: "#fff"}}>Bạn chưa tạo Playlist nào cả.</p>
                    ) : (
                      <ul style={{ listStyle: "none", padding: 0, margin: 0, maxHeight: "200px", overflowY: "auto" }}>
                        {customPlaylists.map(pl => (
                          <li key={pl.id} onClick={() => handleAddSongToPlaylist(pl.id)} style={{ padding: "12px", backgroundColor: "#333", marginBottom: "8px", borderRadius: "5px", cursor: "pointer", display: "flex", alignItems: "center", gap: "10px" }} onMouseOver={(e) => e.currentTarget.style.backgroundColor = "#444"} onMouseOut={(e) => e.currentTarget.style.backgroundColor = "#333"}>
                            <img src={pl.coverImage} style={{width: "30px", height: "30px", borderRadius: "4px"}} />
                            {pl.name}
                          </li>
                        ))}
                      </ul>
                    )}
                    <button id="btn-cancel" onClick={() => setIsAddSongModalOpen(false)} style={{ marginTop: "15px", width: "100%" }}>Đóng</button>
                  </div>
                </div>
              )}
            </div>

            <div className="main-content">
              {currentView === "home" && (
                <React.Fragment>
                  <h1>Chào buổi chiều</h1>
                  <div className="playlists-grid">
                    {playlists.map((playlist, index) => (
                      <div key={playlist.id} className={`playlist-card ${activePlaylistIndex === index ? 'active' : ''}`} onClick={() => openPlaylist(index)} >
                        <img src={playlist.coverImage} alt={playlist.name} />
                        <h3>{playlist.name}</h3>
                        <p>{playlist.description}</p>
                      </div>
                    ))}
                  </div>
                </React.Fragment>
              )}

              {currentView === "playlist" && selectedPlaylistIndex !== null && (
                <div style={{ padding: "20px" }}>
                  <div style={{ display: "flex", gap: "24px", marginBottom: "30px", alignItems: "flex-end" }}>
                    <img src={playlists[selectedPlaylistIndex].coverImage} alt="Cover" style={{ width: "220px", height: "220px", borderRadius: "10px", boxShadow: "0 8px 24px rgba(0,0,0,0.5)", objectFit: "cover" }} />
                    <div>
                      <p style={{ textTransform: "uppercase", fontSize: "13px", fontWeight: "bold", color: "#fff", marginBottom: "8px" }}>Playlist</p>
                      <h1 style={{ fontSize: "3.5rem", margin: "0 0 15px 0", color: "#fff", fontWeight: "900" }}>{playlists[selectedPlaylistIndex].name}</h1>
                      <p style={{ color: "#b3b3b3", fontSize: "15px", marginBottom: "20px" }}>{playlists[selectedPlaylistIndex].description}</p>
                      <button onClick={() => { if(playlists[selectedPlaylistIndex].songs.length === 0) { alert("Playlist trống!"); return; } setActivePlaylistIndex(selectedPlaylistIndex); setCurrentSongIndex(0); setIsPlaying(true); }} style={{ padding: "15px 40px", borderRadius: "30px", backgroundColor: "#1db954", color: "#000", border: "none", fontWeight: "bold", fontSize: "16px", cursor: "pointer" }}>▶ Phát tất cả</button>
                      
                      {/* Nút Xóa Playlist (Chỉ hiện cho playlist tự tạo) */}
                      {playlists[selectedPlaylistIndex].id.startsWith("custom_") && (
                        <button 
                          onClick={() => {
                            if(confirm("Bạn có chắc muốn xóa playlist này không?")) {
                              const updated = playlists.filter((_, i) => i !== selectedPlaylistIndex);
                              setPlaylists(updated);
                              setCurrentView("home");
                            }
                          }}
                          style={{ marginLeft: "15px", padding: "15px 20px", borderRadius: "30px", backgroundColor: "transparent", color: "#fff", border: "1px solid #555", cursor: "pointer" }}
                        >
                          🗑 Xóa Playlist
                        </button>
                      )}
                    </div>
                  </div>

                  {playlists[selectedPlaylistIndex].songs.length === 0 ? (
                      <p style={{ color: "#b3b3b3", fontSize: "16px", textAlign: "center", marginTop: "50px" }}>Playlist này trống. Hãy thêm nhạc vào nhé!</p>
                  ) : (
                      <table style={{ width: "100%", borderCollapse: "collapse", textAlign: "left", color: "#b3b3b3" }}>
                      <thead>
                          <tr style={{ borderBottom: "1px solid #282828" }}>
                          <th style={{ padding: "10px 15px", width: "40px" }}>#</th>
                          <th style={{ padding: "10px 15px" }}>Tiêu đề</th>
                          <th style={{ padding: "10px 15px", textAlign: "right" }}>Nghe</th>
                          </tr>
                      </thead>
                      <tbody>
                          {playlists[selectedPlaylistIndex].songs.map((song, idx) => (
                          <tr key={idx} style={{ borderBottom: "1px solid #2a2a2a", cursor: "pointer" }} onMouseOver={(e) => e.currentTarget.style.backgroundColor = "rgba(255,255,255,0.1)"} onMouseOut={(e) => e.currentTarget.style.backgroundColor = "transparent"} onClick={() => { setActivePlaylistIndex(selectedPlaylistIndex); setCurrentSongIndex(idx); setIsPlaying(true); }}>
                              <td style={{ padding: "15px" }}>{idx + 1}</td>
                              <td style={{ padding: "15px" }}>
                              <div style={{ display: "flex", alignItems: "center", gap: "15px" }}>
                                  <img src={song.cover} alt="cover" style={{ width: "45px", height: "45px", borderRadius: "4px" }} />
                                  <div style={{ display: "flex", flexDirection: "column", gap: "4px" }}>
                                  <span style={{ color: "#fff", fontSize: "16px", fontWeight: "500" }}>{song.title}</span>
                                  <span style={{ fontSize: "13px" }} onClick={(e) => { e.stopPropagation(); viewArtist(song.artist); }}>{song.artist}</span>
                                  </div>
                              </div>
                              </td>
                              <td style={{ padding: "15px", textAlign: "right", color: "#1db954" }}>▶</td>
                          </tr>
                          ))}
                      </tbody>
                      </table>
                  )}
                </div>
              )}

              {/* Các view Search, Liked, Artist giữ nguyên như cũ... */}
              {currentView === "search" && (
                <div style={{ padding: "20px" }}>
                  <input type="text" placeholder="Bạn muốn nghe gì?" value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)} autoFocus style={{ width: "100%", maxWidth: "400px", padding: "15px 20px", borderRadius: "30px", border: "none", backgroundColor: "#242424", color: "#fff" }} />
                  {searchResults.map((song, index) => (
                    <div key={index} onClick={() => playSpecificSong(song.title)} style={{ padding: "12px", display: "flex", alignItems: "center", gap: "15px", cursor: "pointer" }}>
                      <img src={song.cover} style={{ width: "45px", borderRadius: "5px" }} />
                      <div><div style={{color: "#fff"}}>{song.title}</div><div style={{fontSize: "12px"}}>{song.artist}</div></div>
                    </div>
                  ))}
                </div>
              )}

              {currentView === "liked" && (
                <div style={{ padding: "20px" }}>
                  <h1>💖 Bài hát đã thích</h1>
                  {likedSongs.map((title, index) => (
                    <div key={index} onClick={() => playSpecificSong(title)} style={{ padding: "12px", color: "#fff", cursor: "pointer" }}>💚 {title}</div>
                  ))}
                </div>
              )}

              {currentView === "artist" && (
                <div style={{ padding: "20px" }}>
                  <h1>🎤 {selectedArtist}</h1>
                  {artistSongs.map((song, index) => (
                    <div key={index} onClick={() => playSpecificSong(song.title)} style={{ padding: "12px", color: "#fff", cursor: "pointer" }}>{song.title}</div>
                  ))}
                </div>
              )}
            </div>
          </div>

          <div className="player-bar">
            <div className="track-info">
              {currentSong.cover && <img src={currentSong.cover} alt="Cover" className="cover-img" />}
              <div>
                <h4>{currentSong.title}</h4>
                <p onClick={() => { if(currentSong.artist !== "Trống") viewArtist(currentSong.artist); }}>{currentSong.artist}</p>
              </div>
              <button className="like-btn" onClick={toggleLike}>{isLiked ? "💚" : "🤍"}</button>
              <button className="like-btn" onClick={() => { if (currentSong.title !== "Chưa có bài hát") { setSongToAdd(currentSong); setIsAddSongModalOpen(true); } }} style={{ marginLeft: "10px" }}>➕</button>
            </div>

            <div className="controls">
              <div className="buttons">
                <button className={`btn-icon ${isShuffle ? 'active-control' : ''}`} onClick={toggleShuffle}>🔀</button>
                <button className="btn-icon" onClick={handlePrev}>⏮</button>
                <button className="btn-play" onClick={togglePlayPause}>{isPlaying ? "⏸" : "▶"}</button>
                <button className="btn-icon" onClick={handleNext}>⏭</button>
                <button className={`btn-icon ${isRepeat ? 'active-control' : ''}`} onClick={toggleRepeat}>🔂</button>
              </div>
              <div className="progress-container">
                <span>{formatTime(currentTime)}</span>
                <input type="range" min="0" max={duration || 0} value={currentTime} onChange={handleSeek} className="progress-bar-input" />
                <span>{formatTime(duration)}</span>
              </div>
            </div>

            <div className="volume-controls">
              <span>🔊</span>
              <input type="range" min="0" max="1" step="0.01" value={volume} onChange={handleVolumeChange} className="volume-slider" />
            </div>
          </div>

          {currentSong.src && (
            <audio 
              ref={audioRef} 
              src={currentSong.src} 
              onTimeUpdate={() => setCurrentTime(audioRef.current.currentTime)}
              onLoadedMetadata={() => setDuration(audioRef.current.duration)}
              onEnded={() => isRepeat ? (audioRef.current.currentTime = 0, audioRef.current.play()) : handleNext()}
            />
          )}
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<MusicPlayer />);
  </script>
</body>
</html>
